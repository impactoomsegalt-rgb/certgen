function cvtD(v){if(!v)return'';v=String(v).trim();if(/^\d{4}-\d{2}-\d{2}/.test(v))return v.slice(0,10);var m=v.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{2,4})/);if(m){var d=m[1],mo=m[2],y=m[3];if(y.length===2)y='20'+y;return y+'-'+mo.padStart(2,'0')+'-'+d.padStart(2,'0');}return'';}

function gerarCodVerif(certId){
  if(!certId)return'------';
  var h=0,s=certId+'|CG26';
  for(var i=0;i<s.length;i++){h=((h<<5)-h)+s.charCodeAt(i);h|=0;}
  var chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789',r='',n=Math.abs(h);

}
function gerarQR(txt,sz){
  return new Promise(function(res){
    try{
      var d=document.createElement('div');
      d.style.cssText='position:fixed;left:-9999px;top:-9999px;';
      document.body.appendChild(d);
      new QRCode(d,{text:txt,width:sz,height:sz,colorDark:'#000',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.M});

        var el=d.querySelector('img')||d.querySelector('canvas');
        var url=el?(el.tagName==='IMG'?el.src:(el.toDataURL?el.toDataURL():'')):'';
        document.body.removeChild(d);res(url);
      },250);
    }catch(e){res('');}
  });
}

// datas múltiplas
function fmtDatas(principal,adicionais){
  if(!principal)return'';
  var todas=[principal].concat((adicionais||[]).filter(Boolean)).sort();
  if(todas.length===1)return fmtCur(todas[0]);
  var partes=todas.map(function(d){var p=d.split('-');return{dia:p[2],mes:p[1],ano:p[0]};});
  var mesmomes=partes.every(function(p){return p.mes===partes[0].mes&&p.ano===partes[0].ano;});
  if(mesmomes){return partes.map(function(p){return p.dia;}).join(', ')+'/'+partes[0].mes+'/'+partes[0].ano;}
  return todas.map(fmtCur).join(', ');
}
function fmtDatasExt(principal,adicionais){
  if(!principal)return'';
  var todas=[principal].concat((adicionais||[]).filter(Boolean)).sort();
  if(todas.length===1)return fmtExt(todas[0]);
  var partes=todas.map(function(d){var p=d.split('-');return{dia:p[2],mes:p[1],ano:p[0]};});
  var mesmomes=partes.every(function(p){return p.mes===partes[0].mes&&p.ano===partes[0].ano;});
  if(mesmomes){return partes.map(function(p){return p.dia;}).join(', ')+' de '+MESES[parseInt(partes[0].mes,10)-1]+' de '+partes[0].ano;}
  return todas.map(fmtExt).join(' e ');
}

}

var AUTH={
  licenca:null,
  entrar:function(){
    var input=document.getElementById('lic-input');
    var btn=document.getElementById('lic-btn');
    var err=document.getElementById('lic-err');
    var cod=input.value.trim().toUpperCase();
    if(!cod){err.textContent='Digite o código de licença.';return;}
    btn.disabled=true;btn.textContent='Verificando...';err.textContent='';
    sbFetch('licencas?codigo=eq.'+encodeURIComponent(cod)+'&select=*').then(function(rows){
      if(!rows||rows.length===0){err.textContent='❌ Código inválido.';btn.disabled=false;btn.textContent='Entrar';return;}
      var lic=rows[0];
      if(!lic.ativo){err.textContent='❌ Licença desativada.';btn.disabled=false;btn.textContent='Entrar';return;}
      if(lic.validade&&new Date(lic.validade)<new Date()){err.textContent='❌ Licença vencida em '+new Date(lic.validade).toLocaleDateString('pt-BR')+'.';btn.disabled=false;btn.textContent='Entrar';return;}
      AUTH.licenca=lic;
      localStorage.setItem('cg:lic',JSON.stringify(lic));
      sbFetch('licencas?codigo=eq.'+encodeURIComponent(cod),{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({ultimo_acesso:new Date().toISOString()})}).catch(function(){});
      sbFetch('log_acessos',{method:'POST',prefer:'return=minimal',body:JSON.stringify({codigo_licenca:cod,evento:'login',detalhes:'Acesso via browser'})}).catch(function(){});
      SYNC.carregar().then(function(){AUTH.iniciarApp();});
    }).catch(function(){
      var salva=localStorage.getItem('cg:lic');
      if(salva){var lic=JSON.parse(salva);if(lic.codigo===cod&&lic.ativo){AUTH.licenca=lic;SYNC.carregar().then(function(){AUTH.iniciarApp(true);});return;}}
      err.textContent='❌ Erro de conexão. Tente novamente.';
      btn.disabled=false;btn.textContent='Entrar';
    });
  },
  checarLicencaSalva:function(){
    var salva=localStorage.getItem('cg:lic');
    if(!salva)return Promise.resolve(false);
    var lic=JSON.parse(salva);
    return sbFetch('licencas?codigo=eq.'+encodeURIComponent(lic.codigo)+'&select=*').then(function(rows){
      if(!rows||rows.length===0||!rows[0].ativo){localStorage.removeItem('cg:lic');return false;}
      if(rows[0].validade&&new Date(rows[0].validade)<new Date()){localStorage.removeItem('cg:lic');return false;}
      AUTH.licenca=rows[0];localStorage.setItem('cg:lic',JSON.stringify(rows[0]));return true;
    }).catch(function(){
      if(lic.ativo){AUTH.licenca=lic;return true;}
      return false;
    });
  },
  iniciarApp:function(offline){
    document.getElementById('login-screen').style.display='none';
    document.getElementById('app-screen').style.display='block';
    document.getElementById('sb-nome').textContent=AUTH.licenca.nome_cliente.split(' ')[0];
    document.getElementById('lic-info').textContent='Licença: '+AUTH.licenca.codigo+'\nPlano: '+AUTH.licenca.plano;
    if(offline)document.getElementById('sync-bar').textContent='⚠️ Modo offline';
    CG.render();
  },
  sair:function(){
    if(!confirm('Deseja sair?'))return;
    localStorage.removeItem('cg:lic');location.reload();
  }
};

var SYNC={
  _timer:null,
  carregar:function(){
    var cod=AUTH.licenca&&AUTH.licenca.codigo;if(!cod)return Promise.resolve();
    return sbFetch('dados_cliente?codigo_licenca=eq.'+encodeURIComponent(cod)+'&select=dados').then(function(rows){
      if(rows&&rows.length>0&&rows[0].dados){
        var d=rows[0].dados;
        if(d.empresa)S.empresa=d.empresa;
        if(d.cursos)S.cursos=d.cursos;
        if(d.alunos)S.alunos=d.alunos;
        if(d.arts)S.arts=d.arts;
        if(d.instrutores)S.instrutores=d.instrutores;
        if(d.regs)S.regs=d.regs;
        if(d.turmas)S.turmas=d.turmas;
        if(d.seq)S.seq=d.seq;
        document.getElementById('sync-bar').textContent='✓ Sincronizado — '+new Date().toLocaleTimeString('pt-BR');
      }
    }).catch(function(){
      var loc=localStorage.getItem('cg:dados');
      if(loc){var d=JSON.parse(loc);['empresa','cursos','alunos','arts','instrutores','regs','turmas','seq'].forEach(function(k){if(d[k])S[k]=d[k];});}
      document.getElementById('sync-bar').textContent='⚠️ Offline — dados locais';
    });
  },
  salvar:function(){
    clearTimeout(SYNC._timer);
    SYNC._timer=setTimeout(function(){SYNC._enviar();},1500);
  },
  _enviar:function(){
    var cod=AUTH.licenca&&AUTH.licenca.codigo;if(!cod)return;
    var dados={empresa:S.empresa,cursos:S.cursos,alunos:S.alunos,arts:S.arts,instrutores:S.instrutores,regs:S.regs,turmas:S.turmas,seq:S.seq};
    localStorage.setItem('cg:dados',JSON.stringify(dados));
    sbFetch('dados_cliente?codigo_licenca=eq.'+encodeURIComponent(cod)+'&select=id').then(function(rows){
      if(rows&&rows.length>0){
        return sbFetch('dados_cliente?codigo_licenca=eq.'+encodeURIComponent(cod),{method:'PATCH',prefer:'return=minimal',body:JSON.stringify({dados:dados,versao:VERSAO,atualizado_em:new Date().toISOString()})});
      } else {
        return sbFetch('dados_cliente',{method:'POST',prefer:'return=minimal',body:JSON.stringify({codigo_licenca:cod,dados:dados,versao:VERSAO})});
      }
    }).then(function(){
      document.getElementById('sync-bar').textContent='✓ Sincronizado — '+new Date().toLocaleTimeString('pt-BR');
    }).catch(function(){
      document.getElementById('sync-bar').textContent='⚠️ Salvo localmente';
    });
  }
};

function salvar(){SYNC.salvar();}

  _coletarForm:function(){
    var f=S.alunoForm;
    f.nome=(document.getElementById('ef-n')||{value:f.nome}).value.trim()||f.nome;
    f.cpf=(document.getElementById('ef-cpf')||{value:f.cpf}).value.trim()||f.cpf;
    f.dataRealizacao=(document.getElementById('ef-d')||{value:f.dataRealizacao}).value||f.dataRealizacao;
    f.local=(document.getElementById('ef-l')||{value:f.local}).value||f.local;
    f.aproveitamento=(document.getElementById('ef-ap')||{value:f.aproveitamento}).value||f.aproveitamento;
    f.tipoEmissao=(document.getElementById('ef-te')||{value:f.tipoEmissao}).value||f.tipoEmissao;
    f.validadeAnos=(document.getElementById('ef-v')||{value:f.validadeAnos}).value;
    f.artId=(document.getElementById('ef-a')||{value:f.artId}).value||'';
    f.cursoId=(document.getElementById('ef-c')||{value:f.cursoId}).value||f.cursoId;
    f.chTeorica=(document.getElementById('ef-cht')||{value:''}).value||'';
    f.chPratica=(document.getElementById('ef-chp')||{value:''}).value||'';
    var et=document.getElementById('ef-t');if(et)f.turmaId=et.value;
  },
  salvarAluno:function(){
    // coleta todos os campos manualmente com fallback seguro
    var f=S.alunoForm;
    var gv=function(id,def){var el=document.getElementById(id);return el?el.value:(def||'');};
    f.nome=gv('ef-n','').trim();
    f.cpf=gv('ef-cpf','').trim();
    f.dataRealizacao=gv('ef-d','');
    f.local=gv('ef-l','');
    f.aproveitamento=gv('ef-ap','100');
    f.tipoEmissao=gv('ef-te','formacao');
    f.validadeAnos=gv('ef-v','');
    f.artId=gv('ef-a','');
    f.cursoId=gv('ef-c',f.cursoId);
    f.chTeorica=gv('ef-cht','');
    f.chPratica=gv('ef-chp','');
    var et=document.getElementById('ef-t');if(et)f.turmaId=et.value;
    if(!f.nome||!f.cpf||!f.dataRealizacao){toast('Preencha nome, CPF e data.');return;}
    if(S.editIdx!==null){

  processarImp:function(){
    var txt=document.getElementById('im-txt')?document.getElementById('im-txt').value:'';
    var cPad=document.getElementById('im-c')?document.getElementById('im-c').value:S.cursos[0].id;
    var dPad=document.getElementById('im-d')?document.getElementById('im-d').value:'';
    var lPad=document.getElementById('im-l')?document.getElementById('im-l').value:'';
    var aPad=document.getElementById('im-a')?document.getElementById('im-a').value:'100';
    var artPad=document.getElementById('im-art')?document.getElementById('im-art').value:'';
    var turPad=document.getElementById('im-t')?document.getElementById('im-t').value:'';
    var linhas=txt.split('\n').map(function(l){return l.trim();}).filter(function(l){return l;});
    if(!linhas.length){document.getElementById('im-prev').innerHTML='';return;}
    var sep=linhas[0].indexOf('\t')>=0?'\t':linhas[0].indexOf(';')>=0?';':',';
    function nH(h){var s=h.toLowerCase().trim();if(s.indexOf('nome')>=0)return'nome';if(s.indexOf('cpf')>=0)return'cpf';if(s.indexOf('data')>=0)return'data';if(s.indexOf('local')>=0)return'local';if(s.indexOf('aproveit')>=0||s.indexOf('%')>=0)return'aprov';return null;}
    var cab=linhas[0].split(sep).map(function(c){return c.trim();}).map(nH);
    var temCab=cab.filter(Boolean).length>=2;
    var dados=temCab?linhas.slice(1):linhas;var res=[];
    dados.forEach(function(ln){
      var f=ln.split(sep).map(function(c){return c.trim();});if(!f.length||(f.length===1&&!f[0]))return;
      var al={nome:'',cpf:'',cursoId:cPad,dataRealizacao:dPad,datasAdicionais:[],chTeorica:'',chPratica:'',local:lPad,aproveitamento:aPad,topicosSelecionados:[],tipoEmissao:'formacao',validadeAnos:'',artId:artPad,turmaId:turPad,certificadoId:'',instrutoresIds:[],foto:null};
      if(temCab){cab.forEach(function(c,i){var v=f[i]||'';if(c==='nome')al.nome=v;else if(c==='cpf')al.cpf=v;else if(c==='data')al.dataRealizacao=cvtD(v)||dPad;else if(c==='local')al.local=v||lPad;else if(c==='aprov')al.aproveitamento=v.replace('%','')||aPad;});}
      else{al.nome=f[0]||'';al.cpf=f[1]||'';if(f[2])al.dataRealizacao=cvtD(f[2])||dPad;if(f[3])al.local=f[3];if(f[4])al.aproveitamento=f[4].replace('%','');}
      if(al.nome)res.push(al);
    });
    var err=document.getElementById('im-err');var pv=document.getElementById('im-prev');
    if(!res.length){err.innerHTML='<div style="padding:10px;background:#fff0f0;border-radius:7px;color:#c0392b;font-size:12.5px;margin-top:8px">⚠️ Nenhum aluno identificado.</div>';pv.innerHTML='';return;}
    err.innerHTML='';window._impPrev=res;
    pv.innerHTML='<div class="card"><div class="row-sb" style="margin-bottom:10px;flex-wrap:wrap;gap:8px"><b>'+res.length+' aluno(s) para importar</b>'+
    '<button class="btn btn-p btn-sm" onclick="CG.confirmarImp()">✓ Importar '+res.length+'</button></div>'+
    '<div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;font-size:12px"><thead><tr>'+
    ['Nome','CPF','Data','Local','Aprov.'].map(function(h){return'<th style="text-align:left;padding:7px 10px;background:#f5f5f0;border-bottom:1px solid #e0e0e0">'+h+'</th>';}).join('')+
    '</tr></thead><tbody>'+res.map(function(a){return'<tr style="border-bottom:1px solid #f0f0f0">'+
    '<td style="padding:5px 10px">'+esc(a.nome)+'</td><td style="padding:5px 10px">'+esc(a.cpf)+'</td>'+
    '<td style="padding:5px 10px">'+fmtCur(a.dataRealizacao)+'</td><td style="padding:5px 10px">'+esc(a.local)+'</td>'+
    '<td style="padding:5px 10px">'+a.aproveitamento+'%</td></tr>';}).join('')+
    '</tbody></table></div></div>';
  },

  _atualizarCart:function(){
    var ce=S._cartEdit;if(!ce)return;
    function set(id,val){var el=document.getElementById(id);if(el)el.textContent=val;}
    set('ce-nome',ce.nome);set('ce-cpf','CPF: '+ce.cpf);set('ce-norma',ce.norma);
    set('ce-curso',ce.cursoNome);set('ce-emp',ce.empresa);
    set('ce-emis',ce.emissao);set('ce-venc',ce.vencimento);
    var cart=document.getElementById('cart-el');
    if(cart)cart.style.background='linear-gradient(135deg,'+ce.cor+' 0%,'+ce.cor+'cc 60%,'+ce.cor+'44 100%)';
  },
  upFotoCart:function(inp){
    var f=inp.files[0];if(!f)return;
    var r=new FileReader();
    r.onload=function(e){
      if(S._cartEdit)S._cartEdit.foto=e.target.result;
      var el=document.getElementById('cart-foto');
      if(el)el.innerHTML='<img src="'+e.target.result+'" style="width:100%;height:100%;object-fit:cover;border-radius:4px;">';
    };
    r.readAsDataURL(f);
  },
  imprimirCart:function(){
    var el=document.getElementById('cart-el');if(!el)return;

    var doc='<!DOCTYPE html><html><head><meta charset="UTF-8"><style>*{box-sizing:border-box;margin:0;padding:0;}body{padding:10mm;}@page{size:A4;margin:10mm;}.grid{display:flex;flex-wrap:wrap;gap:8px;}</style></head><body><div class="grid">'+Array(4).join(html+html)+'</div></body></html>';
    var w=window.open('','_blank');if(!w)return;w.document.write(doc);w.document.close();setTimeout(function(){w.print();},600);

  novaLicenca:function(){
    var nome=prompt('Nome do cliente:');if(!nome)return;
    var email=prompt('Email (opcional):');
    var plano=prompt('Plano (basico/pro/master):','basico');
    var validade=prompt('Data de validade (AAAA-MM-DD, ou vazio):');
    var codigo=nome.split(' ')[0].toUpperCase()+'-'+Math.random().toString(36).slice(2,6).toUpperCase()+'-'+new Date().getFullYear();
    sbFetch('licencas',{method:'POST',prefer:'return=minimal',body:JSON.stringify({codigo:codigo,nome_cliente:nome,email:email||null,ativo:true,validade:validade||null,plano:plano||'basico'})})
    .then(function(){alert('Licença criada!\nCódigo: '+codigo);window._lics=null;CG.render();})
    .catch(function(e){alert('Erro: '+e.message);});
